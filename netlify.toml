[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Redirect Pinterest catalog endpoint to the generated static CSV file
[[redirects]]
  from = "/api/pinterest-catalog"
  to = "/pinterest-catalog.csv"
  status = 200
  force = true

# Redirect subdomain to Men's clothing page
[[redirects]]
  from = "/"
  to = "/clothes"
  status = 301
  force = true
  conditions = {Host = ["necessary.lurevi.in"]}
