[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect subdomain to Men's clothing page
[[redirects]]
  from = "/"
  to = "/clothes"
  status = 301
  force = true
  conditions = {Host = ["necessary.lurevi.in"]}
